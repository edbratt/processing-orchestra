server:
  port: 8080
  host: "127.0.0.1"
  features:
    static-content:
      classpath:
        - context: "/"
          location: "/static"
          welcome: "index.html"

processing:
  sketch-class: "com.processing.server.ProcessingSketch"
  width: 800
  height: 600
  fps: 60

audio:
  mode: "high-quality-stereo"
  modes:
    high-quality-stereo:
      sample-rate: 44100
      channels: 2
      description: "44.1kHz Stereo - Best quality, highest bandwidth"
    high-quality-mono:
      sample-rate: 44100
      channels: 1
      description: "44.1kHz Mono - Good quality, moderate bandwidth"
    voice:
      sample-rate: 22050
      channels: 1
      description: "22.05kHz Mono - Voice quality, low bandwidth"
  buffer-size: 2048
  max-buffer-chunks: 20

motion:
  update-hz: 20
  clamp:
    alpha-degrees: 180
    beta-degrees: 60
    gamma-degrees: 60
    acceleration-g: 3.0
    magnitude-g: 4.0
  mapping:
    tilt-offset-normalized: 0.12
    shake-threshold-g: 0.2
    shake-burst-scale: 1.8
  debug:
    logging: false
    sample-limit: 5

debug:
  logging: false
