server:
  sockets:
    tls:
      port: 8443
      host: "0.0.0.0"
      tls:
        private-key:
          keystore:
            passphrase: "changeit"
            type: "PKCS12"
            resource:
              path: "keystore.p12"
        private-key-cert-chain:
          keystore:
            passphrase: "changeit"
            type: "PKCS12"
            resource:
              path: "keystore.p12"
